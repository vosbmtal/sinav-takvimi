<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veliköy OSB MTAL Sınav Takvimi</title>
    <meta name="description" content="Veliköy OSB MTAL için resmi sınav takvimi: güncel sınav tarihleri, saatleri ve görünüm seçenekleriyle hızlı erişim.">
    <meta name="author" content="Buğra CANATA">
    <meta name="theme-color" content="#f59e0b">
    <link rel="canonical" href="https://sinav.vosb.k12.tr/">

    <meta property="og:title" content="Veliköy OSB MTAL Sınav Takvimi">
    <meta property="og:description" content="Güncel sınav takvimi, tarih ve saat bilgileriyle Veliköy OSB MTAL öğrencileri için hızlı erişim.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sinav.vosb.k12.tr/">
    <meta property="og:site_name" content="Veliköy OSB MTAL Sınav Takvimi">
    <meta property="og:image" content="https://sinav.vosb.k12.tr/logo.svg">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Veliköy OSB MTAL Sınav Takvimi">
    <meta name="twitter:description" content="Veliköy OSB MTAL sınav tarihleri ve saatleri için güncel takvim.">
    <meta name="twitter:image" content="https://sinav.vosb.k12.tr/logo.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Veliköy OSB MTAL",
        "url": "https://sinav.vosb.k12.tr/",
        "logo": "https://sinav.vosb.k12.tr/logo.svg"
    }
    </script>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <div class="header-brand">
                <img src="logo.svg" alt="Veliköy OSB MTAL" class="brand-logo">
                <div class="brand-text">
                    <span class="brand-name">Veliköy OSB MTAL</span>
                    <span class="brand-sub">Sınav Takvimi</span>
                </div>
            </div>
            <div class="header-end">
                <span class="header-date" id="headerDate"></span>
                <button id="themeToggle" class="theme-btn" aria-label="Tema değiştir">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="app-main">
        <div class="content-area">

            <!-- Next Exam Banner -->
            <div class="next-exam-banner" id="nextExamBanner">
                <div class="banner-inner">
                    <span class="banner-loading">Yükleniyor...</span>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="search-wrap">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Ders, tarih veya sınıf...">
                    <button class="search-clear hidden" id="searchClear" aria-label="Temizle">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="toolbar-right">
                    <div class="grade-chips" role="group" aria-label="Sınıf filtresi">
                        <button class="grade-chip active" data-grade="all">Tümü</button>
                        <button class="grade-chip" data-grade="9"><span class="chip-dot dot-9"></span>9</button>
                        <button class="grade-chip" data-grade="10"><span class="chip-dot dot-10"></span>10</button>
                        <button class="grade-chip" data-grade="11"><span class="chip-dot dot-11"></span>11</button>
                    </div>
                    <div class="view-pills" role="tablist">
                        <button class="view-pill active" data-view="calendar" aria-label="Takvim görünümü" title="Takvim">
                            <i class="fas fa-table"></i>
                        </button>
                        <button class="view-pill" data-view="list" aria-label="Liste görünümü" title="Liste">
                            <i class="fas fa-list"></i>
                        </button>
                    </div>
                    <div class="action-btns">
                        <button class="action-btn" id="exportBtn" aria-label="Dışa aktar" title="CSV İndir">
                            <i class="fas fa-download"></i>
                        </button>
                        <button class="action-btn" id="printBtn" aria-label="Yazdır" title="Yazdır">
                            <i class="fas fa-print"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Week Navigation -->
            <div class="week-nav" id="weekNav">
                <div class="week-tabs">
                    <button class="week-tab active" data-week="30 MART-3 NİSAN">30 Mart – 3 Nisan 2026</button>
                    <button class="week-tab" data-week="6-10 NİSAN">6 – 10 Nisan 2026</button>
                </div>
                <div class="grade-legend">
                    <span class="legend-dot dot-9"></span><span class="legend-label">9. Sınıf</span>
                    <span class="legend-dot dot-10"></span><span class="legend-label">10. Sınıf</span>
                    <span class="legend-dot dot-11"></span><span class="legend-label">11. Sınıf</span>
                </div>
            </div>

            <!-- Calendar View (Primary) -->
            <section class="calendar-view" id="calendarView">
                <div class="calendar-scroll">
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </section>

            <!-- List View (Secondary) -->
            <section class="list-view hidden" id="listView">
                <table class="list-table" id="examTable">
                    <thead>
                        <tr>
                            <th>Tarih</th>
                            <th>Gün</th>
                            <th>Saat</th>
                            <th>Sınıf</th>
                            <th>Ders</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="examTableBody"></tbody>
                </table>
            </section>

        </div>
    </main>

    <!-- Exam Modal -->
    <div id="examModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Kapat">
                <i class="fas fa-times"></i>
            </button>
            <h2 class="modal-title">Sınav Detayları</h2>
            <div id="examDetails"></div>
        </div>
    </div>

    <footer class="app-footer">
        <div class="footer-inner">
            <span>&copy; 2026 Veliköy OSB MTAL Sınav Takvimi</span>
            <span>Hazırlayan: Buğra CANATA</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
